<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Modern square table - Extra rounded, app-icon style -->
  <defs>
    <linearGradient id="grad52" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Table body - very rounded corners -->
  <rect x="6" y="14" width="72" height="72" rx="14" fill="#fff" stroke="url(#grad52)" stroke-width="3.5"/>
  <!-- Table header - matches corner radius -->
  <path d="M6 28 L6 22 Q6 14 14 14 L70 14 Q78 14 78 22 L78 28 Z" fill="url(#grad52)"/>
  <!-- Header separator -->
  <line x1="6" y1="34" x2="78" y2="34" stroke="url(#grad52)" stroke-width="2.5"/>
  <!-- Grid - clean 3x3 -->
  <line x1="30" y1="34" x2="30" y2="86" stroke="#0d9488" stroke-width="2" opacity="0.45"/>
  <line x1="54" y1="34" x2="54" y2="86" stroke="#2563eb" stroke-width="2" opacity="0.45"/>
  <line x1="6" y1="51" x2="78" y2="51" stroke="#14b8a6" stroke-width="2" opacity="0.4"/>
  <line x1="6" y1="68" x2="78" y2="68" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
  <!-- Lightning bolt -->
  <path d="M102 6L78 44h14L84 92l32-54H98L102 6z" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
