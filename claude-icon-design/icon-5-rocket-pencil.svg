<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Rocket Pencil - Fast Grading -->
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#be185d"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#grad5)"/>
  <!-- Pencil body (angled like rocket) -->
  <rect x="44" y="28" width="20" height="60" rx="2" fill="#fff" transform="rotate(25 64 64)"/>
  <!-- Pencil tip -->
  <polygon points="54,88 64,108 74,88" fill="#fbbf24" transform="rotate(25 64 64)"/>
  <!-- Pencil eraser -->
  <rect x="44" y="20" width="20" height="12" rx="2" fill="#f472b6" transform="rotate(25 64 64)"/>
  <!-- Speed flames -->
  <ellipse cx="40" cy="36" rx="8" ry="12" fill="#fbbf24" opacity="0.8" transform="rotate(25 64 64)"/>
  <ellipse cx="44" cy="32" rx="5" ry="8" fill="#fff" opacity="0.6" transform="rotate(25 64 64)"/>
  <!-- Motion lines -->
  <line x1="20" y1="90" x2="36" y2="78" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="100" x2="40" y2="88" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
</svg>
