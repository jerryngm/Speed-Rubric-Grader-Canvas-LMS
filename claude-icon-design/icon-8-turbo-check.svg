<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Turbo Checkmark - Circular Speed + Completion -->
  <defs>
    <linearGradient id="grad8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#grad8)"/>
  <!-- Circular speed ring -->
  <circle cx="64" cy="64" r="40" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="8"/>
  <!-- Animated-looking speed arc -->
  <path d="M64 24 A40 40 0 1 1 24 64" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <!-- Speed trail dots -->
  <circle cx="24" cy="64" r="4" fill="#fbbf24"/>
  <circle cx="30" cy="44" r="3" fill="#fbbf24" opacity="0.7"/>
  <circle cx="44" cy="30" r="2" fill="#fbbf24" opacity="0.5"/>
  <!-- Center checkmark -->
  <path d="M48 64l12 12 20-24" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
