<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Modern square table with teal-blue gradient - Refined v1 -->
  <defs>
    <linearGradient id="grad50" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Table body - more square, larger radius -->
  <rect x="4" y="8" width="84" height="84" rx="12" fill="#fff" stroke="url(#grad50)" stroke-width="3"/>
  <!-- Table header -->
  <rect x="4" y="8" width="84" height="22" rx="12" fill="url(#grad50)"/>
  <rect x="4" y="18" width="84" height="12" fill="url(#grad50)"/>
  <!-- Header separator line -->
  <line x1="4" y1="30" x2="88" y2="30" stroke="url(#grad50)" stroke-width="2.5"/>
  <!-- Grid lines - evenly spaced -->
  <line x1="32" y1="30" x2="32" y2="92" stroke="#0d9488" stroke-width="2" opacity="0.4"/>
  <line x1="60" y1="30" x2="60" y2="92" stroke="#2563eb" stroke-width="2" opacity="0.4"/>
  <line x1="4" y1="51" x2="88" y2="51" stroke="#14b8a6" stroke-width="1.5" opacity="0.4"/>
  <line x1="4" y1="72" x2="88" y2="72" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <!-- Lightning bolt -->
  <path d="M108 8L86 44h14L92 88l30-48H104L108 8z" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
</svg>