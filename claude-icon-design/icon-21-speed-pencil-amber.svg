<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Speed Pencil - Diagonal with motion -->
  <defs>
    <linearGradient id="sp1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#sp1)"/>
  <!-- Motion lines -->
  <line x1="16" y1="72" x2="36" y2="52" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  <line x1="20" y1="88" x2="44" y2="64" stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-linecap="round"/>
  <line x1="24" y1="104" x2="52" y2="76" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  <!-- Pencil body -->
  <rect x="52" y="20" width="20" height="64" rx="2" fill="#fff" transform="rotate(45 64 64)"/>
  <!-- Pencil tip -->
  <polygon points="62,84 72,94 82,84" fill="#fbbf24" transform="rotate(45 64 64)"/>
  <!-- Pencil top -->
  <rect x="52" y="12" width="20" height="12" rx="2" fill="#fef3c7" transform="rotate(45 64 64)"/>
</svg>