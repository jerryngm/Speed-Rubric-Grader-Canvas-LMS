      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#pl1)"/>
  <!-- Pencil - vertical -->
  <rect x="28" y="24" width="24" height="72" rx="3" fill="#fff"/>
  <!-- Pencil tip -->
  <polygon points="28,96 40,116 52,96" fill="#fbbf24"/>
