<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Modern square table - Balanced proportions -->
  <defs>
    <linearGradient id="grad53" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Table body -->
  <rect x="8" y="16" width="72" height="72" rx="12" fill="#fff" stroke="url(#grad53)" stroke-width="3"/>
  <!-- Table header with proper rounded top -->
  <rect x="8" y="16" width="72" height="18" rx="12" fill="url(#grad53)"/>
  <rect x="8" y="26" width="72" height="8" fill="url(#grad53)"/>
  <!-- Header separator -->
  <line x1="8" y1="34" x2="80" y2="34" stroke="url(#grad53)" stroke-width="2"/>
  <!-- Grid lines -->
  <line x1="32" y1="34" x2="32" y2="88" stroke="#0d9488" stroke-width="2" opacity="0.4"/>
  <line x1="56" y1="34" x2="56" y2="88" stroke="#2563eb" stroke-width="2" opacity="0.4"/>
  <line x1="8" y1="52" x2="80" y2="52" stroke="#14b8a6" stroke-width="1.5" opacity="0.4"/>
  <line x1="8" y1="70" x2="80" y2="70" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <!-- Lightning bolt - well positioned -->
  <path d="M106 8L82 44h14L88 90l32-52H102L106 8z" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
</svg>