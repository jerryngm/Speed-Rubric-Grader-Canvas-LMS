<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Modern square table - Compact with larger bolt -->
  <defs>
    <linearGradient id="grad51" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Table body - square, prominent radius -->
  <rect x="4" y="12" width="76" height="76" rx="10" fill="#fff" stroke="url(#grad51)" stroke-width="3"/>
  <!-- Table header -->
  <rect x="4" y="12" width="76" height="20" rx="10" fill="url(#grad51)"/>
  <rect x="4" y="22" width="76" height="10" fill="url(#grad51)"/>
  <!-- Header separator -->
  <line x1="4" y1="32" x2="80" y2="32" stroke="url(#grad51)" stroke-width="2"/>
  <!-- Grid - 3x3 feel -->
  <line x1="29" y1="32" x2="29" y2="88" stroke="#0d9488" stroke-width="2" opacity="0.4"/>
  <line x1="54" y1="32" x2="54" y2="88" stroke="#2563eb" stroke-width="2" opacity="0.4"/>
  <line x1="4" y1="50" x2="80" y2="50" stroke="#14b8a6" stroke-width="1.5" opacity="0.4"/>
  <line x1="4" y1="69" x2="80" y2="69" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <!-- Lightning bolt - larger -->
  <path d="M104 4L78 46h16L84 96l36-56H100L104 4z" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
</svg>