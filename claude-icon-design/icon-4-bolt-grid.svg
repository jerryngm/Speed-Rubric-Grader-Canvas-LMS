<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Lightning Bolt over Grid - Speed + Data/Tables -->
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#grad4)"/>
  <!-- Grid pattern -->
  <rect x="24" y="32" width="80" height="64" rx="4" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Grid lines -->
  <line x1="24" y1="52" x2="104" y2="52" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="24" y1="72" x2="104" y2="72" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="52" y1="32" x2="52" y2="96" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="80" y1="32" x2="80" y2="96" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Lightning bolt overlay -->
  <path d="M72 20L48 60h18L56 100l32-48H70L72 20z" fill="#fff" opacity="0.95"/>
