<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Swift Checkmark with Motion Lines -->
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#grad3)"/>
  <!-- Motion lines -->
  <line x1="20" y1="48" x2="40" y2="48" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  <line x1="24" y1="64" x2="48" y2="64" stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-linecap="round"/>
  <line x1="20" y1="80" x2="40" y2="80" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  <!-- Bold checkmark -->
  <path d="M44 64l20 22 40-44" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Speed accent -->
  <circle cx="104" cy="42" r="6" fill="#fbbf24"/>
</svg>
