<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Modern - Centered square table with overlapping bolt -->
  <defs>
    <linearGradient id="grad54" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Table body - centered -->
  <rect x="8" y="20" width="80" height="80" rx="14" fill="#fff" stroke="url(#grad54)" stroke-width="3"/>
  <!-- Table header -->
  <rect x="8" y="20" width="80" height="20" rx="14" fill="url(#grad54)"/>
  <rect x="8" y="32" width="80" height="8" fill="url(#grad54)"/>
  <!-- Header separator -->
  <line x1="8" y1="40" x2="88" y2="40" stroke="url(#grad54)" stroke-width="2"/>
  <!-- Grid -->
  <line x1="35" y1="40" x2="35" y2="100" stroke="#0d9488" stroke-width="2" opacity="0.4"/>
  <line x1="62" y1="40" x2="62" y2="100" stroke="#2563eb" stroke-width="2" opacity="0.4"/>
  <line x1="8" y1="60" x2="88" y2="60" stroke="#14b8a6" stroke-width="1.5" opacity="0.4"/>
  <line x1="8" y1="80" x2="88" y2="80" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <!-- Lightning bolt - overlapping corner -->
  <path d="M100 4L74 44h16L80 96l36-58H96L100 4z" fill="#fbbf24" stroke="#fff" stroke-width="3"/>
  <path d="M100 4L74 44h16L80 96l36-58H96L100 4z" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.5"/>
</svg>