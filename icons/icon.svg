<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
<style>
    .lightning {
        transform-origin: 107px 0px;
        animation: strike 2.5s ease-out infinite;
    }
    @keyframes strike {
        0% { 
            transform: translateY(-30px); 
            opacity: 0;
            filter: none;
        }
        8% { 
            transform: translateY(0); 
            opacity: 1;
            filter: drop-shadow(0 0 20px #fff) drop-shadow(0 0 40px #fbbf24);
        }
        10% { opacity: 0.2; filter: none; }
        12% { 
            opacity: 1;
            filter: drop-shadow(0 0 25px #fff);
        }
        14% { opacity: 0.1; filter: none; }
        16% { 
            opacity: 1;
            filter: drop-shadow(0 0 30px #fff) drop-shadow(0 0 50px #fde68a);
        }
        18% { opacity: 0.4; filter: none; }
        20% { 
            opacity: 1;
            filter: drop-shadow(0 0 8px #f59e0b);
        }
        90%, 100% { 
            transform: translateY(0); 
            opacity: 0;
            filter: none;
        }
    }
</style>
