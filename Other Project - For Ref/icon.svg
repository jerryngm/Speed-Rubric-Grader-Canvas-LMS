  <defs>
    <linearGradient id="sp1-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0" stop-color="#ff6b6b"/>
      <stop offset="1" stop-color="#ff8e53"/>
    </linearGradient>
    <linearGradient id="sp1-yellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0" stop-color="#ffa502"/>
      <stop offset="1" stop-color="#ffcc29"/>
    </linearGradient>
    <linearGradient id="sp1-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0" stop-color="#48bb78"/>
      <stop offset="1" stop-color="#38a169"/>
    </linearGradient>
    <linearGradient gradientUnits="userSpaceOnUse" x1="50.531" y1="7.689" x2="50.531" y2="125.901" id="gradient-1" gradientTransform="matrix(0.872507, 0.488121, -0.295967, 0.529363, 43.704977, 34.588455)">
      <stop offset="0" style="stop-color: rgb(90.588% 10.196% 10.196%)"/>
      <stop offset="1" style="stop-color: rgb(255, 136, 87);"/>
    </linearGradient>
	
		    <style>
      .sparkle {
        transform-box: fill-box;
        transform-origin: center;
        animation: sparkle-pulse 1.8s ease-in-out infinite;
		      }

.sparkle-1 {
  animation-delay: 0s;
}

.sparkle-2 {
  animation-delay: .55s;
  animation-duration: 1.9s;
}

.sparkle-3 {
  animation-delay: 1.05s;
  animation-duration: 2.05s;
}

@keyframes sparkle-pulse {
  0% {
    transform: scale(0.95);
    opacity: 0.45;
  }
  30% {
    transform: scale(1.22);
    opacity: 1;
	filter: brightness(1.08);
  }
  42% {
    transform: scale(1.16);
    opacity: 0.95;
  }
  60% {
    transform: scale(1.06);
    opacity: 0.85;
  }
  100% {
    transform: scale(0.95);
    opacity: 0.45;
  }
}

svg:hover .sparkle {
  animation: sparkle-turbo 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes sparkle-turbo {
  0% {
    transform: scale(0.9);
    opacity: 0.4;
  }
  35% {
    transform: scale(1.26);
    opacity: 1;
  }
  55% {
    transform: scale(1.12);
    opacity: 0.85;
  }
  100% {
    transform: scale(1);
    opacity: 0.6;
  }
}



      /* Respect reduced motion */
      @media (prefers-reduced-motion: reduce) {
        .sparkle { animation: none; }
      }
    </style>
  </defs>


